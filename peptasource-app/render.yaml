# Blueprint Render — déploiement automatique.
# Sur Render : New + → Blueprint → sélectionnez ce dépôt.
services:
  - type: web
    name: peptasource
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # secret généré automatiquement
      - key: ADMIN_EMAIL
        value: admin@peptasource.example
      - key: ADMIN_PASSWORD
        sync: false                  # Render vous demandera de le saisir (choisissez un mot de passe fort)
    # Pour conserver la base entre les déploiements, passez à un plan payant
    # et décommentez le disque ci-dessous (les disques ne sont pas dispo en offre gratuite) :
    # disk:
    #   name: data
    #   mountPath: /opt/render/project/src/data
    #   sizeGB: 1
