services:
  - type: web
    name: peptasource
    runtime: node
    plan: free
    rootDir: peptasource-app
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@peptasource.example
      - key: ADMIN_PASSWORD
        sync: false
